<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Profile | Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --page-bg: #f8f6f2;
            --card-bg: #ffffff;
            --pfp-shape: 50%;
            --accent: #00b894;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--page-bg); background-size: cover; background-position: center;
            background-attachment: fixed; font-family: 'Inter', sans-serif; color: #333; min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 100px 20px 60px; position: relative; }

        /* Main Card & Info */
        .main-white-card {
            background: var(--card-bg); background-size: cover; background-position: center;
            border-radius: 40px; padding: 35px 25px; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center;
        }

        .pfp-area {
            width: 150px; height: 150px; margin-top: -110px; background: #fff; padding: 5px; 
            border-radius: var(--pfp-shape); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden; z-index: 10; position: relative;
        }
        .pfp-area img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--pfp-shape); }

        .user-name { font-family: 'Playfair Display', serif; font-size: 32px; margin: 20px 0; outline: none; text-align: center; }
        
        .info-item { width: 100%; margin-bottom: 18px; }
        .section-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; display: block; }
        .sub-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); width: 100%; padding: 15px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.3); outline: none; min-height: 20px; font-weight: 500; }

        /* Gallery & Drag Animations */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .photo-item { border-radius: 20px; overflow: hidden; aspect-ratio: 1; position: relative; cursor: grab; background: #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .photo-item.dragging { transform: scale(0.9); opacity: 0.6; filter: grayscale(1); border: 2px solid #ff4757; z-index: 100; }

        #trash-zone {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%) scale(0);
            width: 80px; height: 80px; background: #ff4757; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; z-index: 3000; box-shadow: 0 15px 35px rgba(255,71,87,0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #trash-zone.show { transform: translateX(-50%) scale(1); animation: pulseRed 1.5s infinite; }

        /* Fingerprint & Popups */
        .access-trigger { margin: 40px auto 0; width: 70px; height: 70px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.1); color: #ddd; position: relative; z-index: 1000; }
        
        .pulse-animation { animation: heartbeat 2s infinite; color: var(--accent) !important; }
        
        #popNotice {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #222; color: #fff; padding: 12px 25px; border-radius: 50px;
            font-weight: 600; font-size: 14px; opacity: 0; pointer-events: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000;
            white-space: nowrap; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #popNotice.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Keyframes */
        @keyframes heartbeat { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(0, 184, 148, 0); }
            100% { transform: scale(1); }
        }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.6); }
            70% { box-shadow: 0 0 0 25px rgba(255,71,87,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Studio Panel */
        .studio-panel { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #fff; border-radius: 35px 35px 0 0; z-index: 5000; padding: 30px; display: none; flex-direction: column; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .swatch { width: 100%; aspect-ratio: 1; border-radius: 12px; cursor: pointer; border: 1px solid #eee; }
        .hidden { display: none !important; }
        [contenteditable="true"] { background: rgba(0,184,148,0.05) !important; border: 1px dashed var(--accent) !important; padding: 5px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="popNotice">Notice message</div>
<div id="trash-zone"><i class="fa-solid fa-trash-can"></i></div>

<div class="container">
    <div class="main-white-card" id="mainCard">
        <div class="pfp-area" id="pfpZone">
            <img id="pfpImg" src="https://via.placeholder.com/150?text=Profile">
            <input type="file" id="pfpInput" class="hidden" accept="image/*">
        </div>
        <h1 class="user-name" id="uName">New Profile</h1>

        <div class="info-item">
            <span class="section-label">About Me</span>
            <div class="sub-card" id="uAbout">Tap the fingerprint to claim this ID.</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;">
            <div class="info-item">
                <span class="section-label">Birthday</span>
                <div class="sub-card" id="uBday">-- / --</div>
            </div>
            <div class="info-item">
                <span class="section-label">Hobbies</span>
                <div class="sub-card" id="uHobbies">...</div>
            </div>
        </div>

        <div class="info-item">
            <span class="section-label">Favorite</span>
            <div class="sub-card" id="uFav">Music, Movies, Food...</div>
        </div>
    </div>

    <div class="gallery-grid" id="uGallery"></div>
    <button id="addGalBtn" class="hidden" style="width:100%; margin-top:20px; padding:18px; border-radius:22px; border:2px dashed #ddd; background:#fff; font-weight:800; color:#aaa; cursor:pointer;">+ ADD GALLERY PHOTO</button>
    <input type="file" id="galInput" class="hidden" multiple accept="image/*">
    
    <div id="socialBar" style="display:flex; justify-content:center; gap:15px; margin-top:30px;"></div>
    
    <div class="access-trigger" id="keyBtn">
        <i id="mainIcon" class="fa-solid fa-fingerprint"></i>
    </div>
</div>

<div class="studio-panel" id="studio">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0">Studio Lab</h2>
        <i class="fa-solid fa-circle-xmark" id="closeStudio" style="cursor:pointer; font-size:30px; color:#eee;"></i>
    </div>

    <p class="section-label">Full Page Background</p>
    <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-bottom:20px;">
        <div class="swatch" style="background:#f8f6f2" onclick="setPageStyle('--page-bg', '#f8f6f2')"></div>
        <div class="swatch" style="background:linear-gradient(45deg, #00ff87, #60efff)" onclick="setPageStyle('--page-bg', 'linear-gradient(45deg, #00ff87, #60efff)')"></div>
        <div class="swatch" style="background:linear-gradient(45deg, #f093fb, #f5576c)" onclick="setPageStyle('--page-bg', 'linear-gradient(45deg, #f093fb, #f5576c)')"></div>
        <label class="swatch" style="background:#eee; display:flex; align-items:center; justify-content:center;"><input type="file" class="hidden" onchange="setBgImg(this, '--page-bg')"><i class="fa-solid fa-image"></i></label>
    </div>

    <p class="section-label">Info Card Style</p>
    <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-bottom:20px;">
        <div class="swatch" style="background:#fff" onclick="setPageStyle('--card-bg', '#fff')"></div>
        <div class="swatch" style="background:#111" onclick="setPageStyle('--card-bg', '#111')"></div>
        <label class="swatch" style="background:#eee; display:flex; align-items:center; justify-content:center;"><input type="file" class="hidden" onchange="setBgImg(this, '--card-bg')"><i class="fa-solid fa-image"></i></label>
    </div>

    <p class="section-label">Social Media Link</p>
    <input type="url" id="socialIn" placeholder="Instagram, TikTok, or FB URL" style="width:100%; padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:10px;">
    <button onclick="addSocial()" style="width:100%; padding:15px; background:#111; color:white; border-radius:12px; border:none; font-weight:600;">Link Social</button>

    <button onclick="saveToFirebase()" style="width:100%; margin-top:40px; padding:22px; background:var(--accent); color:white; border-radius:20px; border:none; font-weight:800; cursor:pointer; box-shadow: 0 10px 20px rgba(0,184,148,0.2);">SAVE PROFILE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDO7jeyEQr6qdYrorxzT5lNh0QiLzMwYmw",
        authDomain: "qr-code-project-21d42.firebaseapp.com",
        projectId: "qr-code-project-21d42",
        databaseURL: "https://qr-code-project-21d42-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    let userId = urlParams.get('id') || "0000";
    let isOwner = localStorage.getItem('owner_' + userId) === 'true';
    let galleryArr = [];
    let socialLinks = [];

    const popNotice = document.getElementById('popNotice');

    function showPopup(text) {
        popNotice.innerText = text;
        popNotice.classList.add('show');
        setTimeout(() => popNotice.classList.remove('show'), 2500);
    }

    loadData();

    // --- AUTH LOGIC ---
    document.getElementById('keyBtn').onclick = async () => {
        const snap = await get(ref(db, 'profiles/' + userId));
        const keyBtn = document.getElementById('keyBtn');

        if (!snap.exists()) {
            showPopup("✨ Let's get started!");
            enableEditing();
            keyBtn.classList.remove('pulse-animation');
            document.getElementById('studio').style.display = 'flex';
        } 
        else if (isOwner) {
            showPopup("🛠️ Entering Edit Mode...");
            enableEditing();
            document.getElementById('studio').style.display = 'flex';
        } 
        else {
            showPopup("🔒 Access Denied: Incorrect Digital Key.");
            keyBtn.style.animation = "shake 0.4s";
            setTimeout(() => keyBtn.style.animation = "", 400);
        }
    };

    function enableEditing() {
        isOwner = true;
        document.getElementById('addGalBtn').classList.remove('hidden');
        document.getElementById('mainIcon').className = "fa-solid fa-wand-magic-sparkles";
        document.getElementById('keyBtn').style.color = "var(--accent)";
        document.querySelectorAll('.sub-card, .user-name').forEach(el => el.contentEditable = true);
        renderGallery();
    }

    // --- PHOTO OPTIMIZATION ---
    async function processImg(base64) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = base64;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = Math.min(1, 800 / img.width);
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
        });
    }

    document.getElementById('galInput').onchange = (e) => {
        [...e.target.files].forEach(file => {
            const r = new FileReader();
            r.onload = async () => { 
                const optimized = await processImg(r.result);
                galleryArr.push(optimized); 
                renderGallery(); 
            };
            r.readAsDataURL(file);
        });
    };
    document.getElementById('addGalBtn').onclick = () => document.getElementById('galInput').click();

    // --- GALLERY DRAG REMOVE ---
    function renderGallery() {
        const g = document.getElementById('uGallery'); g.innerHTML = '';
        galleryArr.forEach((src, i) => {
            const d = document.createElement('div');
            d.className = 'photo-item';
            d.innerHTML = `<img src="${src}">`;
            
            if(isOwner) {
                d.ontouchstart = () => {
                    d.classList.add('dragging');
                    document.getElementById('trash-zone').classList.add('show');
                };
                d.ontouchend = (e) => {
                    d.classList.remove('dragging');
                    const trash = document.getElementById('trash-zone').getBoundingClientRect();
                    const touch = e.changedTouches[0];
                    if(touch.clientY > trash.top - 60) {
                        galleryArr.splice(i, 1); renderGallery();
                    }
                    document.getElementById('trash-zone').classList.remove('show');
                };
                d.ondblclick = () => { if(confirm("Remove?")) { galleryArr.splice(i,1); renderGallery(); }};
            }
            g.appendChild(d);
        });
    }

    // --- STYLES ---
    window.setPageStyle = (v, val) => document.documentElement.style.setProperty(v, val);
    window.setBgImg = (input, v) => {
        const r = new FileReader();
        r.onload = () => document.documentElement.style.setProperty(v, `url(${r.result})`);
        r.readAsDataURL(input.files[0]);
    };

    window.addSocial = () => {
        const url = document.getElementById('socialIn').value;
        if(url) { socialLinks.push(url); renderSocials(); document.getElementById('socialIn').value = ''; }
    };

    function renderSocials() {
        const b = document.getElementById('socialBar'); b.innerHTML = '';
        socialLinks.forEach(l => {
            const a = document.createElement('a');
            a.style = "width:45px; height:45px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 5px 15px rgba(0,0,0,0.05); color:#222; text-decoration:none;";
            a.href = l; a.target = "_blank";
            a.innerHTML = `<i class="fa-solid fa-link"></i>`;
            b.appendChild(a);
        });
    }

    // --- DATABASE ---
    window.saveToFirebase = async () => {
        const data = {
            name: document.getElementById('uName').innerText,
            about: document.getElementById('uAbout').innerText,
            bday: document.getElementById('uBday').innerText,
            hobbies: document.getElementById('uHobbies').innerText,
            fav: document.getElementById('uFav').innerText,
            pfp: document.getElementById('pfpImg').src,
            pageStyle: getComputedStyle(document.documentElement).getPropertyValue('--page-bg'),
            cardStyle: getComputedStyle(document.documentElement).getPropertyValue('--card-bg'),
            gallery: galleryArr,
            socials: socialLinks
        };
        await set(ref(db, 'profiles/' + userId), data);
        localStorage.setItem('owner_' + userId, 'true');
        location.reload();
    };

    function loadData() {
        onValue(ref(db, 'profiles/' + userId), (snap) => {
            const v = snap.val();
            const btn = document.getElementById('keyBtn');
            if(v) {
                document.getElementById('uName').innerText = v.name;
                document.getElementById('uAbout').innerText = v.about;
                document.getElementById('uBday').innerText = v.bday;
                document.getElementById('uHobbies').innerText = v.hobbies;
                document.getElementById('uFav').innerText = v.fav;
                document.getElementById('pfpImg').src = v.pfp;
                setPageStyle('--page-bg', v.pageStyle);
                setPageStyle('--card-bg', v.cardStyle);
                galleryArr = v.gallery || [];
                socialLinks = v.socials || [];
                renderSocials(); renderGallery();
                if(isOwner) enableEditing();
                btn.classList.remove('pulse-animation');
            } else {
                btn.classList.add('pulse-animation');
            }
        });
    }

    document.getElementById('closeStudio').onclick = () => document.getElementById('studio').style.display = 'none';
    document.getElementById('pfpZone').onclick = () => isOwner && document.getElementById('pfpInput').click();
    document.getElementById('pfpInput').onchange = (e) => {
        const r = new FileReader();
        r.onload = () => document.getElementById('pfpImg').src = r.result;
        r.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
