<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { 
            --page-bg: #f2f2f7; 
            --card-bg: rgba(255, 255, 255, 0.35); 
            --pfp-shape: 50%; 
            --accent: #007aff; 
        }

        /* 📱 UNIVERSAL RESET FOR MOBILE & GITHUB PAGES */
        * { 
            box-sizing: border-box; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background: var(--page-bg); background-size: cover; 
            background-position: center; background-attachment: fixed; 
            font-family: 'Inter', sans-serif; color: #1c1c1e; min-height: 100vh; 
            overflow-x: hidden; /* Prevents side-to-side scrolling bugs */
        }

        #initLoader { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .load-spinner { width: 30px; height: 30px; border: 3px solid #e5e5ea; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 📦 FLEXIBLE CONTAINER */
        .container { 
            width: 100%; 
            max-width: 450px; /* Limits width on desktop */
            margin: 0 auto; 
            padding: 100px 20px 80px; 
            position: relative; 
        }

        /* 💎 APPLE-STYLE GLASS CARD */
        .main-white-card { 
            background: var(--card-bg); 
            background-size: cover; background-position: center;
            backdrop-filter: blur(40px) saturate(200%); 
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px; padding: 40px 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.2); 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%;
        }

        /* 👤 RESPONSIVE PFP */
        .pfp-area { 
            width: clamp(110px, 30vw, 140px); 
            height: clamp(110px, 30vw, 140px); 
            margin-top: -90px; 
            background: rgba(255,255,255,0.8); padding: 6px; border-radius: var(--pfp-shape); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.12); overflow: hidden; z-index: 10; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .pfp-area img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--pfp-shape); }
        
        .user-name { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(26px, 8vw, 34px); /* Fluid typography */
            margin: 20px 0 10px; text-align: center;
            text-shadow: 0 2px 15px rgba(255,255,255,0.8);
            letter-spacing: -0.5px;
            width: 100%;
            word-wrap: break-word;
        }
        
        .section-label { 
            font-size: 11px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1.5px; color: rgba(60, 60, 67, 0.6); margin: 18px 0 8px; display: block; 
        }
        
        /* 💎 PREMIUM SUB-CARDS */
        .sub-card { 
            background: rgba(255, 255, 255, 0.45); 
            border: 1px solid rgba(255,255,255,0.6);
            padding: 16px; border-radius: 22px; outline: none; 
            font-weight: 600; color: inherit; font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            width: 100%;
            word-wrap: break-word;
        }

        [contenteditable="true"] { 
            border: 1px dashed var(--accent) !important; 
            background: rgba(255,255,255,0.7) !important; 
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 25px; width: 100%; }
        .photo-item { border-radius: 20px; overflow: hidden; aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .social-bar {
            display: flex; justify-content: center; gap: 15px; margin-top: 35px; 
            flex-wrap: wrap; /* Ensures buttons don't disappear on small screens */
            width: 100%;
        }

        .social-btn {
            width: 55px; height: 55px; background: rgba(255,255,255,0.5); 
            backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            color: #1c1c1e; font-size: 22px; border: 1px solid rgba(255,255,255,0.6); 
            text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .social-btn:active { transform: scale(0.92); }

        #ownerFab { 
            position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; 
            background: rgba(255,255,255,0.95); color: #1c1c1e; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer; z-index: 9999; opacity: 0; pointer-events: none;
        }
        #ownerFab.show { opacity: 1; pointer-events: auto; }

        /* 💎 iOS STYLE STUDIO SHEET */
        .studio-panel { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 35px 35px 0 0; z-index: 10000; 
            padding: 40px 25px 30px; display: none; flex-direction: column; overflow-y: auto; 
            box-shadow: 0 -20px 50px rgba(0,0,0,0.1);
        }
        
        .studio-panel::before {
            content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 5px; background: rgba(0,0,0,0.15); border-radius: 10px;
        }

        .swatch-container { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:25px; }
        
        .swatch { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.8); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); font-size: 16px; color: #555;
        }
        
        #cardColorPicker {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); 
            padding: 0; background: none; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            -webkit-appearance: none; overflow: hidden;
        }
        #cardColorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #cardColorPicker::-webkit-color-swatch { border: none; border-radius: 50%; }

        .aesthetic-input {
            flex: 1; padding: 15px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.05);
            background: rgba(0,0,0,0.03); font-family: inherit; font-size: 15px; outline: none;
            width: 100%;
        }

        .pill-btn {
            padding: 0 20px; background: #1c1c1e; color: white; border-radius: 18px; 
            border: none; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .save-btn {
            width: 100%; margin-top: auto; padding: 20px; background: var(--accent); 
            color: white; border-radius: 20px; border: none; font-weight: 800; 
            font-size: 16px; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="initLoader"><div class="load-spinner"></div><p style="margin-top:15px; font-size:11px; font-weight:600; color:#555;">Authenticating</p></div>

<div class="container">
    <div class="main-white-card" id="mainCard">
        <div class="pfp-area" id="pfpZone">
            <img id="pfpImg" src="https://via.placeholder.com/150">
            <input type="file" id="pfpInput" class="hidden" accept="image/*">
        </div>
        
        <h1 class="user-name" id="uName">New Profile</h1>

        <div style="width:100%">
            <span class="section-label">Bio</span>
            <div class="sub-card" id="uAbout">Tap the pencil icon to edit...</div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 15px;">
                <div><span class="section-label" style="margin-top:0;">Birthday</span><div class="sub-card" id="uBday">--</div></div>
                <div><span class="section-label" style="margin-top:0;">Hobbies</span><div class="sub-card" id="uHobbies">--</div></div>
            </div>

            <span class="section-label">Favorite</span>
            <div class="sub-card" id="uFav">...</div>
        </div>
    </div>

    <div class="gallery-grid" id="uGallery"></div>
    <button id="addGalBtn" class="hidden" style="width:100%; margin-top:25px; padding:20px; border-radius:24px; border:2px dashed rgba(0,0,0,0.1); background:rgba(255,255,255,0.5); font-weight:800; color:#555; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); cursor:pointer;">+ Add Photo</button>
    <input type="file" id="galInput" class="hidden" multiple accept="image/*">
    
    <div id="socialBar" class="social-bar"></div>
</div>

<div id="ownerFab"><i class="fa-solid fa-pen"></i></div>

<div class="studio-panel" id="studio">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="margin:0; font-weight:800; letter-spacing:-0.5px;">Studio Lab</h2>
        <i class="fa-solid fa-circle-xmark" id="closeStudio" style="cursor:pointer; font-size:28px; color:#d1d1d6;"></i>
    </div>

    <p class="section-label">Card Style</p>
    <div class="swatch-container">
        <input type="color" id="cardColorPicker" onchange="updateCardStyle(this.value)">
        <label class="swatch" style="background:rgba(255,255,255,0.5);"><input type="file" class="hidden" accept="image/*" onchange="setCardBgImg(this)"><i class="fa-solid fa-camera"></i></label>
        <div class="swatch" style="background:rgba(255,255,255,0.35);" onclick="updateCardStyle('rgba(255,255,255,0.35)')"></div>
        <div class="swatch" style="background:rgba(0,0,0,0.6);" onclick="updateCardStyle('rgba(0,0,0,0.6)')"></div>
        <div class="swatch" style="background:linear-gradient(135deg, rgba(255,100,100,0.3), rgba(255,200,100,0.3))" onclick="updateCardStyle('linear-gradient(135deg, rgba(255,100,100,0.3), rgba(255,200,100,0.3))')"></div>
    </div>

    <p class="section-label">Page Background</p>
    <div class="swatch-container">
        <div class="swatch" style="background:#f2f2f7" onclick="setPageStyle('--page-bg', '#f2f2f7')"></div>
        <div class="swatch" style="background:linear-gradient(45deg, #a18cd1 0%, #fbc2eb 100%)" onclick="setPageStyle('--page-bg', 'linear-gradient(45deg, #a18cd1 0%, #fbc2eb 100%)')"></div>
        <label class="swatch" style="background:rgba(255,255,255,0.5);"><input type="file" class="hidden" onchange="setBgImg(this, '--page-bg')"><i class="fa-solid fa-image"></i></label>
    </div>

    <p class="section-label">Social Media Links</p>
    <div style="display:flex; gap:10px; margin-bottom:30px;">
        <input type="url" id="socialIn" placeholder="Paste link here..." class="aesthetic-input">
        <button onclick="addSocial()" class="pill-btn">Add</button>
    </div>

    <button onclick="saveToFirebase()" class="save-btn">Save & Sync</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDO7jeyEQr6qdYrorxzT5lNh0QiLzMwYmw",
        authDomain: "qr-code-project-21d42.firebaseapp.com",
        projectId: "qr-code-project-21d42",
        databaseURL: "https://qr-code-project-21d42-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const id = new URLSearchParams(window.location.search).get('id') || "0000";
    let secretKey = localStorage.getItem('owner_key_' + id);
    let isOwner = false;
    let galleryArr = [];
    let socialLinks = [];

    function getSocialIcon(url) {
        url = url.toLowerCase();
        if (url.includes('instagram.com')) return 'fa-brands fa-instagram';
        if (url.includes('tiktok.com')) return 'fa-brands fa-tiktok';
        if (url.includes('facebook.com')) return 'fa-brands fa-facebook';
        if (url.includes('twitter.com') || url.includes('x.com')) return 'fa-brands fa-x-twitter';
        if (url.includes('youtube.com')) return 'fa-brands fa-youtube';
        return 'fa-solid fa-link';
    }

    onValue(ref(db, 'profiles/' + id), (snap) => {
        const v = snap.val();
        if(v) {
            isOwner = (secretKey && v.secretKey === secretKey);
            document.getElementById('uName').innerText = v.name || "Name";
            document.getElementById('uAbout').innerText = v.about || "Bio...";
            document.getElementById('uBday').innerText = v.bday || "--";
            document.getElementById('uHobbies').innerText = v.hobbies || "--";
            document.getElementById('uFav').innerText = v.fav || "...";
            document.getElementById('pfpImg').src = v.pfp || "https://via.placeholder.com/150";
            document.documentElement.style.setProperty('--page-bg', v.pageStyle || "#f2f2f7");
            document.documentElement.style.setProperty('--card-bg', v.cardStyle || "rgba(255,255,255,0.35)");
            galleryArr = v.gallery || [];
            socialLinks = v.socials || [];
            renderGallery(); renderSocials();
            if(isOwner) enableOwnerMode();
        } else {
            // FIX 1: If it's a new profile, we still need to enable owner mode if they created it
            if(secretKey) {
                isOwner = true;
                enableOwnerMode();
            }
        }
        // FIX 2: Always hide the loader, even if Firebase is empty!
        document.getElementById('initLoader').style.display = 'none';
    });

    function enableOwnerMode() {
        isOwner = true;
        document.getElementById('ownerFab').classList.add('show');
        document.querySelectorAll('.sub-card, .user-name').forEach(el => el.contentEditable = true);
        document.getElementById('addGalBtn').classList.remove('hidden');
    }

    window.updateCardStyle = (val) => {
        if(val.startsWith('#')) {
            const r = parseInt(val.slice(1,3), 16), g = parseInt(val.slice(3,5), 16), b = parseInt(val.slice(5,7), 16);
            val = `rgba(${r}, ${g}, ${b}, 0.35)`;
        }
        document.documentElement.style.setProperty('--card-bg', val);
    };

    window.setCardBgImg = (input) => {
        const r = new FileReader();
        r.onload = async (e) => {
            const comp = await compress(e.target.result, 0.3);
            document.documentElement.style.setProperty('--card-bg', `url(${comp})`);
        };
        r.readAsDataURL(input.files[0]);
    };

    window.setPageStyle = (v, val) => document.documentElement.style.setProperty(v, val);
    window.setBgImg = (input, v) => {
        const r = new FileReader();
        r.onload = async (e) => document.documentElement.style.setProperty(v, `url(${await compress(e.target.result, 0.4)})`);
        r.readAsDataURL(input.files[0]);
    };

    window.addSocial = () => {
        const u = document.getElementById('socialIn').value;
        if(u) { socialLinks.push(u); renderSocials(); document.getElementById('socialIn').value = ''; }
    };

    function renderSocials() {
        const b = document.getElementById('socialBar'); b.innerHTML = '';
        socialLinks.forEach((l, i) => {
            const a = document.createElement('a'); a.className = 'social-btn';
            a.href = l; a.target = "_blank"; a.innerHTML = `<i class="${getSocialIcon(l)}"></i>`;
            if(isOwner) a.oncontextmenu = (e) => { e.preventDefault(); if(confirm("Remove link?")) { socialLinks.splice(i,1); renderSocials(); }};
            b.appendChild(a);
        });
    }

    window.saveToFirebase = async () => {
        // Show loader while saving
        document.getElementById('initLoader').style.display = 'flex';
        document.querySelector('#initLoader p').innerText = "Saving Profile...";
        
        const data = {
            secretKey: secretKey,
            name: document.getElementById('uName').innerText,
            about: document.getElementById('uAbout').innerText,
            bday: document.getElementById('uBday').innerText,
            hobbies: document.getElementById('uHobbies').innerText,
            fav: document.getElementById('uFav').innerText,
            pfp: document.getElementById('pfpImg').src,
            pageStyle: getComputedStyle(document.documentElement).getPropertyValue('--page-bg'),
            cardStyle: getComputedStyle(document.documentElement).getPropertyValue('--card-bg'),
            gallery: galleryArr,
            socials: socialLinks,
            timestamp: Date.now()
        };
        await set(ref(db, 'profiles/' + id), data);
        location.reload();
    };

    async function compress(base64, q = 0.5) {
        return new Promise((res) => {
            const img = new Image(); img.src = base64;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const s = Math.min(1, 600 / img.width);
                canvas.width = img.width * s; canvas.height = img.height * s;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                res(canvas.toDataURL('image/jpeg', q));
            };
        });
    }

    function renderGallery() {
        const g = document.getElementById('uGallery'); g.innerHTML = '';
        galleryArr.forEach(src => {
            const d = document.createElement('div'); d.className = 'photo-item';
            d.innerHTML = `<img src="${src}">`;
            g.appendChild(d);
        });
    }

    document.getElementById('ownerFab').onclick = () => document.getElementById('studio').style.display = 'flex';
    document.getElementById('closeStudio').onclick = () => document.getElementById('studio').style.display = 'none';
    document.getElementById('pfpZone').onclick = () => isOwner && document.getElementById('pfpInput').click();
    
    // FIX 3: Fixed the multi-image upload crash by wrapping it in an async for-loop properly
    document.getElementById('galInput').onchange = async (e) => {
        const files = [...e.target.files];
        for(let i=0; i<files.length; i++) {
            const base64 = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.readAsDataURL(files[i]);
            });
            const comp = await compress(base64);
            galleryArr.push(comp);
        }
        renderGallery();
    };
    document.getElementById('addGalBtn').onclick = () => document.getElementById('galInput').click();
</script>
</body>
</html>
