<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital ID | Claimable Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --page-bg: #f8f6f2; --accent: #00b894; --text-main: #111; }
        * { box-sizing: border-box; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--page-bg); background-size: cover; 
            background-position: center; background-attachment: fixed;
            font-family: 'Inter', sans-serif; min-height: 100vh; color: var(--text-main);
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; padding: 100px 20px 60px; }

        /* --- ENHANCED GLASS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
        }

        .main-card { padding: 40px 30px; position: relative; text-align: center; }

        .id-badge {
            background: #000; color: #fff;
            padding: 6px 20px; border-radius: 50px;
            font-size: 12px; font-weight: 800;
            letter-spacing: 3px; width: fit-content; margin: 0 auto 20px;
            text-transform: uppercase;
        }

        .pfp-area { 
            width: 150px; height: 150px; margin: 0 auto; 
            background: #fff; border-radius: 50%; padding: 6px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer; 
            overflow: hidden; position: relative;
        }
        .pfp-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* BIGGER TEXT FOR EASY READING */
        .user-name { font-family: 'Playfair Display', serif; font-size: 34px; margin: 20px 0; outline: none; line-height: 1.2; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; text-align: left; }
        .info-item { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 25px; border: 1px solid #fff; }
        .label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #666; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .content { font-size: 17px; font-weight: 500; outline: none; min-height: 1.2em; color: #000; }

        .vibe-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .social-icon { width: 55px; height: 55px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #222; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); text-decoration: none; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .photo-card { border-radius: 25px; overflow: hidden; aspect-ratio: 1; background: #eee; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ACTION BUTTONS */
        .start-btn { 
            padding: 22px 50px; border-radius: 50px; background: #fff; 
            color: #000; border: none; font-weight: 800; font-size: 18px; 
            cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            letter-spacing: 1px;
        }

        .edit-fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #222; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        .studio { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #fff; border-radius: 50px 50px 0 0; z-index: 1000; padding: 40px; display: none; flex-direction: column; overflow-y: auto; }
        
        .hidden { display: none !important; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card glass-panel" id="infoCard">
        <div class="id-badge">ID: <span id="displayID">####</span></div>
        
        <div class="pfp-area" id="pfpTrigger">
            <img id="pfpImg" src="https://via.placeholder.com/200?text=SCAN">
            <input type="file" id="pfpInput" class="hidden" accept="image/*">
        </div>
        
        <h1 class="user-name" id="uName">New Profile</h1>

        <div class="info-grid">
            <div class="info-item">
                <div class="label"><i class="fa-solid fa-cake-candles"></i> Birthday</div>
                <div class="content" id="uBday">Tap to set</div>
            </div>
            <div class="info-item">
                <div class="label"><i class="fa-solid fa-star"></i> Interests</div>
                <div class="content" id="uHobbies">What do you love?</div>
            </div>
        </div>

        <div class="vibe-row">
            <div class="info-item" style="margin:0">
                <div class="label" style="color:#00b894">Likes</div>
                <div class="content" id="uLikes">...</div>
            </div>
            <div class="info-item" style="margin:0">
                <div class="label" style="color:#ff4757">Dislikes</div>
                <div class="content" id="uDislikes">...</div>
            </div>
        </div>

        <div class="social-bar" id="socialBar"></div>
    </div>

    <div class="gallery-grid" id="gallery"></div>
    <button id="addImgBtn" class="hidden glass-panel" style="width:100%; margin-top:25px; padding:22px; font-weight:800; font-size:16px; cursor:pointer; background:rgba(255,255,255,0.5); border:none;">+ ADD NEW PHOTO</button>
    <input type="file" id="galInput" class="hidden" accept="image/*" multiple>

    <div id="scannerZone" style="margin-top:50px; text-align:center;">
        <div id="claimedUI" class="hidden">
            <div class="social-icon" id="fpBtn" style="width:80px; height:80px; margin:0 auto; font-size:35px; cursor:pointer; background:white;"><i class="fa-solid fa-fingerprint"></i></div>
            <p style="font-size: 12px; margin-top: 15px; letter-spacing: 2px; font-weight:800; color: #888;">LOCKED PROFILE</p>
        </div>
        <div id="unclaimedUI" class="hidden">
            <button class="start-btn" id="startBtn">LET'S GET STARTED</button>
        </div>
    </div>
</div>

<div class="edit-fab" id="openStudio"><i class="fa-solid fa-wand-magic-sparkles"></i></div>

<div class="studio" id="studioPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0; font-size:28px;">Profile Studio</h2>
        <i class="fa-solid fa-circle-xmark" id="closeStudio" style="font-size:35px; cursor:pointer; color:#ddd;"></i>
    </div>

    <p class="label">Background Color</p>
    <input type="color" id="bgPicker" onchange="setPageBg(this.value)" style="width:100%; height:60px; border:none; border-radius:15px; margin-bottom:25px; cursor:pointer;">

    <p class="label">Social Media Link</p>
    <input type="url" id="socialInput" style="width:100%; padding:18px; border-radius:15px; border:1px solid #eee; background:#f9f9f9; margin-bottom:15px; font-size:16px;" placeholder="Paste Social Link Here">
    <button onclick="addLink()" style="width:100%; padding:15px; background:#222; color:#fff; border-radius:15px; border:none; font-weight:bold; margin-bottom:40px;">Add Social Icon</button>

    <button onclick="saveAll()" style="width:100%; padding:25px; background:var(--accent); color:white; border-radius:25px; border:none; font-weight:bold; font-size:18px; box-shadow: 0 10px 30px rgba(0,184,148,0.3);">SAVE & LOCK PROFILE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDO7jeyEQr6qdYrorxzT5lNh0QiLzMwYmw",
        authDomain: "qr-code-project-21d42.firebaseapp.com",
        projectId: "qr-code-project-21d42",
        databaseURL: "https://qr-code-project-21d42-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Get Numeric ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    let userId = urlParams.get('id') || "0000";
    document.getElementById('displayID').innerText = userId;
    
    let galleryList = [];
    let socialLinks = [];
    let isOwner = localStorage.getItem('key_' + userId) === 'true';

    // CHECK IF PROFILE EXISTS
    get(ref(db, 'profiles/' + userId)).then(snap => {
        if (snap.exists()) {
            // Already claimed
            document.getElementById('claimedUI').classList.remove('hidden');
            loadData();
        } else {
            // New / Unclaimed
            document.getElementById('unclaimedUI').classList.remove('hidden');
        }
    });

    document.getElementById('startBtn').onclick = () => unlock();
    document.getElementById('fpBtn').onclick = () => isOwner ? unlock() : alert("LOCKED: This ID is already claimed by another device.");

    function unlock() {
        document.getElementById('scannerZone').classList.add('hidden');
        document.getElementById('openStudio').style.display = 'flex';
        document.getElementById('addImgBtn').classList.remove('hidden');
        document.querySelectorAll('.content, .user-name').forEach(el => el.contentEditable = true);
        renderGallery(); renderSocials();
    }

    // SOCIALS
    window.addLink = () => {
        const val = document.getElementById('socialInput').value;
        if(val) { socialLinks.push(val); renderSocials(); document.getElementById('socialInput').value = ''; }
    };

    function renderSocials() {
        const bar = document.getElementById('socialBar'); bar.innerHTML = '';
        socialLinks.forEach(url => {
            let icon = "fa-link";
            if(url.includes("instagram.com")) icon = "fa-brands fa-instagram";
            else if(url.includes("facebook.com")) icon = "fa-brands fa-facebook";
            else if(url.includes("tiktok.com")) icon = "fa-brands fa-tiktok";
            else if(url.includes("youtube.com")) icon = "fa-brands fa-youtube";
            bar.innerHTML += `<a href="${url}" target="_blank" class="social-icon"><i class="${icon}"></i></a>`;
        });
    }

    // GALLERY
    document.getElementById('addImgBtn').onclick = () => document.getElementById('galInput').click();
    document.getElementById('galInput').onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const r = new FileReader();
            r.onload = (ev) => { if(ev.target.result) { galleryList.push(ev.target.result); renderGallery(); } };
            r.readAsDataURL(file);
        });
    };

    window.removePhoto = (i) => { galleryList.splice(i, 1); renderGallery(); };

    function renderGallery() {
        const g = document.getElementById('gallery'); g.innerHTML = '';
        const canEdit = document.getElementById('uName').contentEditable === "true";
        galleryList.forEach((src, i) => {
            g.innerHTML += `<div class="photo-card"><img src="${src}">${canEdit ? `<div class="del-btn" onclick="removePhoto(${i})"><i class="fa-solid fa-xmark"></i></div>` : ''}</div>`;
        });
    }

    // STUDIO
    document.getElementById('openStudio').onclick = () => document.getElementById('studioPanel').style.display = 'flex';
    document.getElementById('closeStudio').onclick = () => document.getElementById('studioPanel').style.display = 'none';
    window.setPageBg = (bg) => { document.body.style.backgroundColor = bg; };
    
    document.getElementById('pfpTrigger').onclick = () => { if(document.getElementById('uName').contentEditable === "true") document.getElementById('pfpInput').click(); };
    document.getElementById('pfpInput').onchange = (e) => {
        const r = new FileReader(); r.onload = () => document.getElementById('pfpImg').src = r.result;
        r.readAsDataURL(e.target.files[0]);
    };

    // SAVE & LOCK
    window.saveAll = async () => {
        const data = {
            name: document.getElementById('uName').innerText,
            bday: document.getElementById('uBday').innerText,
            hobbies: document.getElementById('uHobbies').innerText,
            likes: document.getElementById('uLikes').innerText,
            dislikes: document.getElementById('uDislikes').innerText,
            pfp: document.getElementById('pfpImg').src,
            pageBg: document.body.style.backgroundColor,
            gallery: galleryList,
            socials: socialLinks,
            claimed: true
        };
        await set(ref(db, 'profiles/' + userId), data);
        localStorage.setItem('key_' + userId, 'true'); // Key that identifies this phone as owner
        alert("Success! This ID is now locked to your device."); location.reload();
    };

    function loadData() {
        onValue(ref(db, 'profiles/' + userId), (snap) => {
            const v = snap.val(); if(!v) return;
            if(document.activeElement.contentEditable !== "true") {
                document.getElementById('uName').innerText = v.name || 'Set Name';
                document.getElementById('uBday').innerText = v.bday || '...';
                document.getElementById('uHobbies').innerText = v.hobbies || '...';
                document.getElementById('uLikes').innerText = v.likes || '...';
                document.getElementById('uDislikes').innerText = v.dislikes || '...';
            }
            document.getElementById('pfpImg').src = v.pfp || 'https://via.placeholder.com/200?text=Profile';
            if(v.pageBg) document.body.style.backgroundColor = v.pageBg;
            galleryList = v.gallery || [];
            socialLinks = v.socials || [];
            renderGallery(); renderSocials();
        });
    }
</script>
</body>
</html>
