<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital ID | Digital Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --page-bg: #f8f6f2; --accent: #00b894; --text-main: #111; }
        * { box-sizing: border-box; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--page-bg); font-family: 'Inter', sans-serif; 
            min-height: 100vh; color: var(--text-main); display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; padding: 60px 20px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px; padding: 40px 30px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
        }

        .id-badge {
            background: #000; color: #fff; padding: 6px 20px; border-radius: 50px;
            font-size: 14px; font-weight: 800; letter-spacing: 2px; width: fit-content; margin: 0 auto 20px;
        }

        .pfp-area { 
            width: 150px; height: 150px; margin: 0 auto; border-radius: 50%; padding: 5px; 
            background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;
        }
        .pfp-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .user-name { font-family: 'Playfair Display', serif; font-size: 36px; margin: 20px 0; outline: none; }

        .info-grid { display: grid; gap: 15px; margin-top: 25px; text-align: left; }
        .info-item { background: #fff; padding: 20px; border-radius: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .label { font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .content { font-size: 18px; font-weight: 600; outline: none; }

        .vibe-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .social-icon { width: 55px; height: 55px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-decoration: none; color: inherit; }

        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .photo-card { border-radius: 20px; overflow: hidden; aspect-ratio: 1; background: #ddd; position: relative; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .start-btn { 
            padding: 20px 40px; border-radius: 50px; background: #222; color: #fff; 
            border: none; font-weight: 800; font-size: 18px; cursor: pointer; width: 100%;
        }

        .edit-fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #222; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .studio { position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh; background: #fff; border-radius: 40px 40px 0 0; z-index: 1000; padding: 40px; display: none; flex-direction: column; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        
        .hidden { display: none !important; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="glass-panel" id="infoCard">
        <div class="id-badge">ID: <span id="displayID">...</span></div>
        
        <div class="pfp-area" id="pfpTrigger">
            <img id="pfpImg" src="https://via.placeholder.com/200?text=SCAN">
            <input type="file" id="pfpInput" class="hidden" accept="image/*">
        </div>
        
        <h1 class="user-name" id="uName">Loading Profile...</h1>

        <div class="info-grid">
            <div class="info-item"><div class="label">Birthday</div><div class="content" id="uBday">...</div></div>
            <div class="info-item"><div class="label">Interests</div><div class="content" id="uHobbies">...</div></div>
        </div>

        <div class="vibe-row">
            <div class="info-item"><div class="label" style="color:var(--accent)">Likes</div><div class="content" id="uLikes">...</div></div>
            <div class="info-item"><div class="label" style="color:#ff4757">Dislikes</div><div class="content" id="uDislikes">...</div></div>
        </div>
        <div class="social-bar" id="socialBar"></div>
    </div>

    <div class="gallery-grid" id="gallery"></div>
    <button id="addImgBtn" class="hidden start-btn" style="margin-top: 20px; background: #fff; color: #222;">+ ADD PHOTO</button>
    <input type="file" id="galInput" class="hidden" accept="image/*" multiple>

    <div id="scannerZone" style="margin-top:40px; text-align:center;">
        <div id="claimedUI" class="hidden">
            <div id="fpBtn" style="font-size:50px; cursor:pointer;"><i class="fa-solid fa-fingerprint"></i></div>
            <p style="font-weight:800; color:#888; font-size:12px; margin-top:10px;">LOCKED PROFILE</p>
        </div>
        <div id="unclaimedUI" class="hidden">
            <button class="start-btn" id="startBtn">LET'S GET STARTED</button>
        </div>
    </div>
</div>

<div class="edit-fab" id="openStudio"><i class="fa-solid fa-pen-nib"></i></div>
<div class="studio" id="studioPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2>Customize</h2>
        <i class="fa-solid fa-xmark" id="closeStudio" style="font-size:30px; cursor:pointer;"></i>
    </div>
    <p class="label">Background Color</p>
    <input type="color" id="bgPicker" onchange="document.body.style.backgroundColor = this.value" style="width:100%; height:50px; border:none; border-radius:10px; margin-bottom:20px;">
    <p class="label">Social Link</p>
    <input type="url" id="socialInput" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;" placeholder="Instagram/TikTok URL">
    <button onclick="addLink()" style="width:100%; padding:12px; margin-bottom:30px;">Add Link</button>
    <button onclick="saveAll()" class="start-btn" style="background:var(--accent)">SAVE & LOCK</button>
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyDO7jeyEQr6qdYrorxzT5lNh0QiLzMwYmw",
        authDomain: "qr-code-project-21d42.firebaseapp.com",
        projectId: "qr-code-project-21d42",
        databaseURL: "https://qr-code-project-21d42-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. STATE
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    let galleryList = [];
    let socialLinks = [];

    if(!userId) {
        document.getElementById('uName').innerText = "Invalid ID";
        document.getElementById('displayID').innerText = "ERROR";
    } else {
        document.getElementById('displayID').innerText = userId;
        checkProfile();
    }

    // 3. CORE LOGIC
    function checkProfile() {
        db.ref('profiles/' + userId).once('value', (snap) => {
            if (snap.exists()) {
                document.getElementById('claimedUI').classList.remove('hidden');
                loadData(snap.val());
            } else {
                document.getElementById('unclaimedUI').classList.remove('hidden');
                document.getElementById('uName').innerText = "Unclaimed ID";
            }
        });
    }

    const isOwner = () => localStorage.getItem('key_' + userId) === 'true';

    document.getElementById('startBtn').onclick = () => unlockEditor();
    document.getElementById('fpBtn').onclick = () => isOwner() ? unlockEditor() : alert("Not your ID!");

    function unlockEditor() {
        document.getElementById('scannerZone').classList.add('hidden');
        document.getElementById('openStudio').style.display = 'flex';
        document.getElementById('addImgBtn').classList.remove('hidden');
        document.querySelectorAll('.content, .user-name').forEach(el => el.contentEditable = true);
        document.getElementById('uName').innerText = document.getElementById('uName').innerText === "Unclaimed ID" ? "Your Name" : document.getElementById('uName').innerText;
        renderGallery(); renderSocials();
    }

    // SOCIALS
    window.addLink = () => {
        const val = document.getElementById('socialInput').value;
        if(val) { socialLinks.push(val); renderSocials(); document.getElementById('socialInput').value = ''; }
    };

    function renderSocials() {
        const bar = document.getElementById('socialBar'); bar.innerHTML = '';
        socialLinks.forEach(url => {
            let icon = "fa-link";
            if(url.includes("instagram")) icon = "fa-brands fa-instagram";
            else if(url.includes("tiktok")) icon = "fa-brands fa-tiktok";
            bar.innerHTML += `<a href="${url}" target="_blank" class="social-icon"><i class="${icon}"></i></a>`;
        });
    }

    // GALLERY
    document.getElementById('addImgBtn').onclick = () => document.getElementById('galInput').click();
    document.getElementById('galInput').onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const r = new FileReader();
            r.onload = (ev) => { galleryList.push(ev.target.result); renderGallery(); };
            r.readAsDataURL(file);
        });
    };

    window.removePhoto = (i) => { galleryList.splice(i, 1); renderGallery(); };

    function renderGallery() {
        const g = document.getElementById('gallery'); g.innerHTML = '';
        const canEdit = document.getElementById('uName').contentEditable === "true";
        galleryList.forEach((src, i) => {
            g.innerHTML += `<div class="photo-card"><img src="${src}">${canEdit ? `<div class="del-btn" onclick="removePhoto(${i})">×</div>` : ''}</div>`;
        });
    }

    // SAVE
    window.saveAll = async () => {
        const data = {
            name: document.getElementById('uName').innerText,
            bday: document.getElementById('uBday').innerText,
            hobbies: document.getElementById('uHobbies').innerText,
            likes: document.getElementById('uLikes').innerText,
            dislikes: document.getElementById('uDislikes').innerText,
            pfp: document.getElementById('pfpImg').src,
            pageBg: document.body.style.backgroundColor,
            gallery: galleryList,
            socials: socialLinks,
            claimed: true
        };
        await db.ref('profiles/' + userId).set(data);
        localStorage.setItem('key_' + userId, 'true');
        location.reload();
    };

    function loadData(v) {
        document.getElementById('uName').innerText = v.name || '';
        document.getElementById('uBday').innerText = v.bday || '';
        document.getElementById('uHobbies').innerText = v.hobbies || '';
        document.getElementById('uLikes').innerText = v.likes || '';
        document.getElementById('uDislikes').innerText = v.dislikes || '';
        document.getElementById('pfpImg').src = v.pfp || 'https://via.placeholder.com/200';
        document.body.style.backgroundColor = v.pageBg || '#f8f6f2';
        galleryList = v.gallery || [];
        socialLinks = v.socials || [];
        renderGallery(); renderSocials();
    }

    // STUDIO UI
    document.getElementById('openStudio').onclick = () => document.getElementById('studioPanel').style.display = 'flex';
    document.getElementById('closeStudio').onclick = () => document.getElementById('studioPanel').style.display = 'none';
    document.getElementById('pfpTrigger').onclick = () => { if(document.getElementById('uName').contentEditable === "true") document.getElementById('pfpInput').click(); };
    document.getElementById('pfpInput').onchange = (e) => {
        const r = new FileReader(); r.onload = () => document.getElementById('pfpImg').src = r.result;
        r.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
